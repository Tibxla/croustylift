# CI : garde le code vert sur chaque push / PR. Le projet est déployé sur Vercel,
# qui exécute `tsc -b && vite build` au déploiement (un typecheck cassé bloque le
# déploiement) mais NE LANCE PAS les tests — d'où ce workflow : lint + tests +
# build (qui inclut le typecheck) avant tout merge.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    # Les modules data/* importent src/lib/supabase.ts, qui exige VITE_SUPABASE_* dès
    # l'import (sinon il throw). Les tests mockent le réseau et le build n'établit
    # aucune connexion : des valeurs FACTICES suffisent à instancier le client. La
    # vraie config (clé publishable) vit côté Vercel, jamais ici.
    env:
      VITE_SUPABASE_URL: https://dummy.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_dummy_ci_not_a_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
